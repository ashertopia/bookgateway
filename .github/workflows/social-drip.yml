# .github/workflows/social-drip.yml
# =============================================================================
# BookGateway Social Drip — daily social media post generator
# =============================================================================
#
# What this does:
#   1. Runs on a schedule (Mon–Fri at 10 AM UTC) or on manual trigger.
#   2. Checks out the repo and runs social_post_generator.py.
#   3. The script picks the next high-priority unposted review, writes the
#      generated post copy to social_queue/YYYY-MM-DD.json, and updates
#      social_posted.json to track what's been posted.
#   4. Commits and pushes those two changed files back to the repo so the
#      state persists across runs.
#   5. Writes the generated post text to the GitHub Actions job summary
#      ($GITHUB_STEP_SUMMARY) so the team can read it right in the Actions UI.
#
# Manual trigger (workflow_dispatch) accepts an optional `category` input so
# you can request a specific genre on demand, e.g. "Romance & Chick Lit".
#
# Required secrets:
#   GITHUB_TOKEN — automatically provided by GitHub Actions; no setup needed.
# =============================================================================

name: Social Drip — Daily Post Generator

on:
  # -------------------------------------------------------------------------
  # Scheduled run: Monday through Friday at 10:00 AM UTC
  # -------------------------------------------------------------------------
  schedule:
    - cron: "0 10 * * 1-5"

  # -------------------------------------------------------------------------
  # Manual trigger: go to Actions → Social Drip → Run workflow
  # Optionally specify a category to force a genre pick.
  # -------------------------------------------------------------------------
  workflow_dispatch:
    inputs:
      category:
        description: >
          Category filter (optional). Leave blank to use priority order.
          Examples: "Romance & Chick Lit", "Thriller & Suspense", "Fantasy"
        required: false
        default: ""

jobs:
  generate-post:
    name: Generate Today's Social Post
    runs-on: ubuntu-latest

    # Give the built-in GITHUB_TOKEN permission to push commits
    permissions:
      contents: write

    steps:
      # -----------------------------------------------------------------------
      # Step 1 — Check out the full repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git log / blame work if needed
          fetch-depth: 1

      # -----------------------------------------------------------------------
      # Step 2 — Set up Python 3.11
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # No third-party dependencies — standard library only.
      # If you add requirements.txt later, uncomment:
      # - name: Install dependencies
      #   run: pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # Step 3 — Run the post generator
      # Passes the optional category filter when provided via workflow_dispatch.
      # Output is captured in GENERATOR_OUTPUT for use in the job summary.
      # -----------------------------------------------------------------------
      - name: Generate social post
        id: generate
        env:
          CATEGORY_FILTER: ${{ github.event.inputs.category }}
        run: |
          # Build the argument string — only include --category if non-empty
          ARGS=""
          if [ -n "$CATEGORY_FILTER" ]; then
            ARGS="--category $CATEGORY_FILTER"
          fi

          echo "Running: python social_post_generator.py $ARGS"
          python social_post_generator.py $ARGS | tee /tmp/generator_output.txt

          # Persist the output path for the summary step
          echo "output_file=/tmp/generator_output.txt" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Step 4 — Commit and push updated files back to the repo
      # Commits social_queue/YYYY-MM-DD.json and social_posted.json.
      # If nothing changed (e.g. already ran today), the commit is skipped.
      # -----------------------------------------------------------------------
      - name: Commit and push updated social files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the files the script touches
          git add social_queue/ social_posted.json

          # Check if there is anything to commit
          if git diff --cached --quiet; then
            echo "Nothing to commit — social files unchanged."
          else
            TODAY=$(date -u +"%Y-%m-%d")
            git commit -m "chore: social post generated for ${TODAY} [skip ci]"
            git push
            echo "Committed and pushed social queue update."
          fi

      # -----------------------------------------------------------------------
      # Step 5 — Write the generated post text to the GitHub Actions job summary
      # Scott can read this directly in the Actions UI without downloading files.
      # -----------------------------------------------------------------------
      - name: Write job summary
        if: always()
        run: |
          OUTPUT_FILE="${{ steps.generate.outputs.output_file }}"

          {
            echo "## BookGateway — Today's Social Post"
            echo ""
            echo "> Generated on $(date -u +'%A, %B %-d %Y') at $(date -u +'%H:%M UTC')"
            echo ""

            if [ -f "$OUTPUT_FILE" ]; then
              echo '```'
              cat "$OUTPUT_FILE"
              echo '```'
            else
              echo "_No output captured — check the Generate step logs._"
            fi

            echo ""
            echo "---"
            echo "_Powered by [BookGateway.com](https://bookgateway.com) social automation_"
          } >> "$GITHUB_STEP_SUMMARY"
